name: Build Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Required for creating releases and uploading assets
permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (Windows NSIS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Watermarker v__VERSION__"
          releaseBody: "Windows 安装包。解压或安装后双击运行，系统需安装 WebView2（Windows 10+ 已自带）。"
          releaseDraft: false
          args: --bundles nsis

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (macOS DMG)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Watermarker v__VERSION__"
          releaseBody: |
            ## 安装说明

            ### Windows
            运行 `Watermarker_*.exe` 安装程序，按向导完成安装。

            ### macOS
            下载 DMG 后，由于应用未经过 Apple 官方公证，首次打开前需在终端执行：
            ```
            sudo xattr -rd com.apple.quarantine /Applications/Watermarker.app
            ```
            然后即可正常打开 Watermarker。
          releaseDraft: false
          args: --bundles dmg
          signingIdentity: "-"
